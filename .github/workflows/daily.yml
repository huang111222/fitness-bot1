name: AI Fitness Stable

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Send AI Fitness Plan
        run: |
          STYLE=$((RANDOM % 3))

          if [ "$STYLE" -eq 0 ]; then
            TRAIN="力量训练：深蹲4×10，壶铃摆荡4×15，哑铃推举4×10"
          elif [ "$STYLE" -eq 1 ]; then
            TRAIN="有氧训练：骑行40分钟，间歇冲刺6×1分钟，核心训练3×60秒"
          else
            TRAIN="恢复训练：轻松骑行20分钟，全身拉伸15分钟"
          fi

          EN="Discipline is the bridge between goals and results."
          CN="自律是目标与结果之间的桥梁"

          MSG="🏋️ 今日AI训练计划

🔥 训练内容
$TRAIN

📌 励志语录
EN: $EN
CN: $CN"

          curl -s "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=53ab5af5-b293-4dcc-ad40-fc6508c48924" \
          -H "Content-Type: application/json" \
          -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MSG\"}}"
