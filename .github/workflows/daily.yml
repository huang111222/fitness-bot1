name: Daily Fitness

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Send WeChat Message
        run: |
          curl -s "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=53ab5af5-b293-4dcc-ad40-fc6508c48924" \
          -H "Content-Type: application/json" \
          -d '{"msgtype":"text","text":{"content":"🏋️ 今日训练：热身10分钟 + 壶铃 + 哑铃 + 骑行30分钟 + 核心训练"}}'
