name: AI Fitness Coach

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Generate AI Fitness Plan
        run: |
          set -e

          # 生成随机训练风格
          STYLE=$((RANDOM % 3))

          if [ "$STYLE" -eq 0 ]; then
            TRAIN="力量训练：深蹲4组×10次，壶铃摆荡4组×15次，哑铃推举4组×10次"
          elif [ "$STYLE" -eq 1 ]; then
            TRAIN="有氧训练：骑行40分钟，间歇冲刺6组×1分钟，核心训练平板3组×60秒"
          else
            TRAIN="恢复训练：轻松骑行20分钟，全身拉伸15分钟，核心激活10分钟"
          fi

          # 双语励志（中英互译风格）
          QUOTES=(
            "Discipline is choosing what you want most over what you want now. / 自律是选择你最想要的，而不是你现在想要的。"
            "You don’t rise to the level of your goals, you fall to the level of your systems. / 你不会达到目标的高度，而是会跌落到系统的水平。"
            "Small daily improvements lead to stunning results. / 每日微小进步，终将带来惊人成果。"
            "Pain is temporary, pride is forever. / 痛苦是暂时的，骄傲是永恒的。"
          )

          QUOTE=${QUOTES[$RANDOM % ${#QUOTES[@]}]}

          MSG="🏋️ 今日AI训练计划

🔥 训练内容（60分钟）
${TRAIN}

📌 励志语录
${QUOTE}"

          curl -s "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=53ab5af5-b293-4dcc-ad40-fc6508c48924" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"$MSG\"}}"
